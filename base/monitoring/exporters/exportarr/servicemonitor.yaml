---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: exportarr-sonarr
  namespace: monitoring
  labels:
    app.kubernetes.io/name: exportarr-sonarr
    app.kubernetes.io/part-of: homelab
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: exportarr-sonarr
  endpoints:
    - port: metrics
      interval: 60s
      scrapeTimeout: 30s
