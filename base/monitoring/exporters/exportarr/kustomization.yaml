apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml
# NOTE: The exportarr-credentials Secret must be created manually.
# It is NOT stored in git. Required keys:
#   sonarr-api-key:   <from Sonarr Settings > General > API Key>
#   radarr-api-key:   <from Radarr Settings > General > API Key>
#   prowlarr-api-key: <from Prowlarr Settings > General > API Key>
#   bazarr-api-key:   <from Bazarr Settings > General > API Key>
