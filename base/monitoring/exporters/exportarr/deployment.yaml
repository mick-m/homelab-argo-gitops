---
# Sonarr exporter
apiVersion: apps/v1
kind: Deployment
metadata:
  name: exportarr-sonarr
  namespace: monitoring
  labels:
    app.kubernetes.io/name: exportarr-sonarr
    app.kubernetes.io/part-of: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: exportarr-sonarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: exportarr-sonarr
        app.kubernetes.io/part-of: homelab
    spec:
      containers:
        - name: exportarr
          image: ghcr.io/onedr0p/exportarr:v2.3.0
          args:
            - sonarr
          env:
            - name: PORT
              value: "9707"
            - name: URL
              value: "http://sonarr.media.svc:8989"
            - name: APIKEY
              valueFrom:
                secretKeyRef:
                  name: exportarr-credentials
                  key: sonarr-api-key
          ports:
            - name: metrics
              containerPort: 9707
              protocol: TCP
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
