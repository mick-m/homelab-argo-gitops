apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml
# NOTE: The proxmox-exporter-config Secret must be created manually.
# It is NOT stored in git. Required content — a file named pve.yml:
#
#   default:
#     user: prometheus@pve
#     token_name: prometheus
#     token_value: <your-api-token>
#     verify_ssl: false
#
# Create a read-only PVE API token:
#   pveum user add prometheus@pve
#   pveum aclmod / -user prometheus@pve -role PVEAuditor
#   pveum user token add prometheus@pve prometheus --privsep=0
#
# IMPORTANT: Update the ServiceMonitor relabeling target IP to match
# your Proxmox node. For multi-node clusters, use additionalScrapeConfigs
# in the kube-prometheus-stack values instead (see values.yaml).
