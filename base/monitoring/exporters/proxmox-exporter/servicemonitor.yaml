apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: proxmox-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: proxmox-exporter
    app.kubernetes.io/part-of: homelab
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: proxmox-exporter
  endpoints:
    - port: metrics
      interval: 60s
      scrapeTimeout: 30s
      path: /pve
      params:
        cluster:
          - "1"
        node:
          - "1"
      relabelings:
        - sourceLabels: [__address__]
          targetLabel: __param_target
          replacement: "192.168.1.152"
        - sourceLabels: [__param_target]
          targetLabel: instance
          replacement: "pve"
        - targetLabel: __address__
          replacement: proxmox-exporter.monitoring.svc:9221
    - port: metrics
      interval: 60s
      scrapeTimeout: 30s
      path: /pve
      params:
        cluster:
          - "1"
        node:
          - "1"
      relabelings:
        - sourceLabels: [__address__]
          targetLabel: __param_target
          replacement: "192.168.1.153"
        - sourceLabels: [__param_target]
          targetLabel: instance
          replacement: "pve2"
        - targetLabel: __address__
          replacement: proxmox-exporter.monitoring.svc:9221
    - port: metrics
      interval: 60s
      scrapeTimeout: 30s
      path: /pve
      params:
        cluster:
          - "1"
        node:
          - "1"
      relabelings:
        - sourceLabels: [__address__]
          targetLabel: __param_target
          replacement: "192.168.1.219"
        - sourceLabels: [__param_target]
          targetLabel: instance
          replacement: "pve3"
        - targetLabel: __address__
          replacement: proxmox-exporter.monitoring.svc:9221
