apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: proxmox-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: proxmox-exporter
    app.kubernetes.io/part-of: homelab
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: proxmox-exporter
  endpoints:
    - port: metrics
      interval: 60s
      scrapeTimeout: 30s
      path: /pve
      params:
        cluster:
          - "1"
        node:
          - "1"
      # The PVE exporter uses multi-target pattern.
      # The target Proxmox host is passed via the 'target' query param.
      # We use relabeling to route to the correct Proxmox host.
      relabelings:
        - sourceLabels: [__address__]
          targetLabel: __param_target
          replacement: "192.168.1.100"
        - sourceLabels: [__param_target]
          targetLabel: instance
        - targetLabel: __address__
          replacement: proxmox-exporter.monitoring.svc:9221
