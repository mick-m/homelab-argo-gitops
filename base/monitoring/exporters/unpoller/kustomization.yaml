apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml
# NOTE: The unpoller-credentials Secret must be created manually.
# It is NOT stored in git. Required keys:
#   unifi-url:  https://<UDM-IP>:443  (e.g. https://192.168.1.1:443)
#   unifi-user: <read-only UniFi local user>
#   unifi-pass: <password>
