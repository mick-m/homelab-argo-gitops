apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: qbittorrent-exporter
    app.kubernetes.io/part-of: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qbittorrent-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qbittorrent-exporter
        app.kubernetes.io/part-of: homelab
    spec:
      containers:
        - name: qbittorrent-exporter
          image: ghcr.io/esanchezm/prometheus-qbittorrent-exporter:latest
          env:
            - name: QBITTORRENT_HOST
              value: "qbittorrent.media.svc"
            - name: QBITTORRENT_PORT
              value: "80"
            - name: QBITTORRENT_USER
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-exporter-credentials
                  key: username
            - name: QBITTORRENT_PASS
              valueFrom:
                secretKeyRef:
                  name: qbittorrent-exporter-credentials
                  key: password
            - name: EXPORTER_PORT
              value: "9561"
          ports:
            - name: metrics
              containerPort: 9561
              protocol: TCP
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
