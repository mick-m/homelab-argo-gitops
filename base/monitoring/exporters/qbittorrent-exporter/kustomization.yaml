apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml
# NOTE: If qBittorrent requires authentication, create the Secret manually:
#   kubectl -n monitoring create secret generic qbittorrent-exporter-credentials \
#     --from-literal=username=admin \
#     --from-literal=password=<your-password>
# The Secret is optional — the exporter works without auth if qBittorrent
# has authentication disabled or allows the pod's IP.
