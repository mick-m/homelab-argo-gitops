---
apiVersion: v1
kind: Service
metadata:
  name: macos-node-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: macos-node-exporter
    app.kubernetes.io/part-of: homelab
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: metrics
      port: 9100
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: macos-node-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: macos-node-exporter
    app.kubernetes.io/part-of: homelab
subsets:
  - addresses:
      - ip: 100.64.155.43
    ports:
      - name: metrics
        port: 9100
        protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: macos-node-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: macos-node-exporter
    app.kubernetes.io/part-of: homelab
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: macos-node-exporter
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - monitoring
