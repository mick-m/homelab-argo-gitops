apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - deployment.yaml
  - service.yaml
  - service-nodeport.yaml
  - servicemonitor.yaml
# NOTE: TrueNAS must be configured to push Graphite metrics to this service.
#
# In TrueNAS UI:
#   Reporting > Reporting Exporter > Add
#     Type: Graphite
#     Hostname: truenas-graphite-exporter.monitoring.svc  (or the K3s node IP)
#     Port: 9109
#
# Since TrueNAS (.202) is external to K3s, you need to expose the graphite
# port via a NodePort or LoadBalancer. See the staging/prod overlay for
# the NodePort service override.
