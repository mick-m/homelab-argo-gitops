apiVersion: apps/v1
kind: Deployment
metadata:
  name: truenas-graphite-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: truenas-graphite-exporter
    app.kubernetes.io/part-of: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: truenas-graphite-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: truenas-graphite-exporter
        app.kubernetes.io/part-of: homelab
    spec:
      containers:
        - name: graphite-exporter
          # This image bundles graphite_exporter with TrueNAS-specific mapping
          image: ghcr.io/supporterino/truenas-graphite-to-prometheus:latest@sha256:60e7645f74a3243d7fb9e6a15c05ea3b4cddfd2bc7ba9e2b11321ce1d38286dd
          ports:
            - name: graphite
              containerPort: 9109
              protocol: TCP
            - name: metrics
              containerPort: 9108
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
