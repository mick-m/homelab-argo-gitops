apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: truenas-graphite-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: truenas-graphite-exporter
    app.kubernetes.io/part-of: homelab
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: truenas-graphite-exporter
  endpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 15s
