apiVersion: v1
kind: Service
metadata:
  name: truenas-graphite-exporter-nodeport
  namespace: monitoring
  labels:
    app.kubernetes.io/name: truenas-graphite-exporter
    app.kubernetes.io/part-of: homelab
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: truenas-graphite-exporter
  ports:
    # Graphite ingestion — TrueNAS pushes to this NodePort
    - name: graphite
      port: 9109
      targetPort: graphite
      nodePort: 30109
      protocol: TCP
# TrueNAS should be configured to send Graphite data to:
#   <K3s-node-IP>:30109
# For prod: 192.168.1.173:30109
# For staging: 192.168.1.251:30109
