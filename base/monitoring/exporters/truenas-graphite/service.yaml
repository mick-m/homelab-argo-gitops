apiVersion: v1
kind: Service
metadata:
  name: truenas-graphite-exporter
  namespace: monitoring
  labels:
    app.kubernetes.io/name: truenas-graphite-exporter
    app.kubernetes.io/part-of: homelab
spec:
  selector:
    app.kubernetes.io/name: truenas-graphite-exporter
  ports:
    # Graphite ingestion port — TrueNAS pushes metrics here
    - name: graphite
      port: 9109
      targetPort: graphite
      protocol: TCP
    # Prometheus scrape port
    - name: metrics
      port: 9108
      targetPort: metrics
      protocol: TCP
