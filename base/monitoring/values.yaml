# kube-prometheus-stack Helm values
# Chart: prometheus-community/kube-prometheus-stack

alertmanager:
  enabled: false

grafana:
  adminPassword: admin
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: local-path
  initChownData:
    enabled: false
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Community Grafana dashboards for exporters
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: grafana-dashboards-exporters
          orgId: 1
          folder: Exporters
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/exporters
  dashboards:
    exporters:
      # UnPoller / UniFi dashboards
      unifi-client-insights:
        gnetId: 11315
        revision: 9
        datasource: Prometheus
      unifi-network-sites:
        gnetId: 11311
        revision: 5
        datasource: Prometheus
      unifi-usg-insights:
        gnetId: 11313
        revision: 9
        datasource: Prometheus
      unifi-usw-insights:
        gnetId: 11312
        revision: 9
        datasource: Prometheus
      unifi-uap-insights:
        gnetId: 11314
        revision: 10
        datasource: Prometheus
      # Proxmox VE dashboard
      proxmox-ve:
        gnetId: 10347
        revision: 5
        datasource: Prometheus
      # Exportarr / arr stack dashboard
      exportarr:
        gnetId: 12896
        revision: 1
        datasource: Prometheus
      # qBittorrent dashboard
      qbittorrent:
        gnetId: 15116
        revision: 1
        datasource: Prometheus
      # Nextcloud dashboard
      nextcloud:
        gnetId: 9632
        revision: 1
        datasource: Prometheus

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

prometheus:
  prometheusSpec:
    # Allow Prometheus to discover all ServiceMonitors in the cluster,
    # not just those matching the Helm release label.
    serviceMonitorSelectorNilUsesHelmValues: false
    retention: 15d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
