# kube-prometheus-stack Helm values
# Chart: prometheus-community/kube-prometheus-stack

alertmanager:
  enabled: false

grafana:
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: local-path
  initChownData:
    enabled: false
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  extraInitContainers:
    - name: fix-datasource-uids
      image: busybox:latest
      command:
        - sh
        - -c
        - |
          cd /var/lib/grafana/dashboards/exporters
          for f in *.json; do
            sed -i 's/\${DS_PROMETHEUS}/prometheus/g' "$f"
            sed -i 's/\${DS_MIMIR}/prometheus/g' "$f"
          done
      volumeMounts:
        - name: storage
          mountPath: /var/lib/grafana
  # Community Grafana dashboards for exporters
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: grafana-dashboards-exporters
          orgId: 1
          folder: Exporters
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/exporters
  dashboards:
    exporters:
      # UnPoller / UniFi dashboards
      unifi-client-insights:
        gnetId: 11315
        revision: 9
        datasource: Prometheus
      unifi-network-sites:
        gnetId: 11311
        revision: 5
        datasource: Prometheus
      unifi-usg-insights:
        gnetId: 11313
        revision: 9
        datasource: Prometheus
      unifi-usw-insights:
        gnetId: 11312
        revision: 9
        datasource: Prometheus
      unifi-uap-insights:
        gnetId: 11314
        revision: 10
        datasource: Prometheus
      # Proxmox VE dashboard
      proxmox-ve:
        gnetId: 10347
        revision: 5
        datasource: Prometheus
      # Exportarr / arr stack dashboard
      exportarr:
        gnetId: 12896
        revision: 1
        datasource: Prometheus
      # qBittorrent dashboard
      qbittorrent:
        gnetId: 15116
        revision: 1
        datasource: Prometheus
      # Node Exporter Full (works with external node_exporter targets)
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      # TrueNAS dashboards
      truenas-overview:
        url: https://raw.githubusercontent.com/Supporterino/truenas-graphite-to-prometheus/main/dashboards/truenas_scale.json
        datasource: Prometheus
      truenas-disk-insights:
        url: https://raw.githubusercontent.com/Supporterino/truenas-graphite-to-prometheus/main/dashboards/truenas_scale_disk_insights.json
        datasource: Prometheus
      truenas-temperatures:
        url: https://raw.githubusercontent.com/Supporterino/truenas-graphite-to-prometheus/main/dashboards/truenas_scale_temperatures.json
        datasource: Prometheus
      # Nextcloud dashboard
      nextcloud:
        gnetId: 9632
        revision: 1
        datasource: Prometheus

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

prometheus:
  prometheusSpec:
    # Allow Prometheus to discover all ServiceMonitors in the cluster,
    # not just those matching the Helm release label.
    serviceMonitorSelectorNilUsesHelmValues: false
    retention: 15d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 2Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
