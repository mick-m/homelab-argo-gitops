apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: productivity
  labels:
    app.kubernetes.io/name: searxng
    app.kubernetes.io/part-of: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: searxng
  template:
    metadata:
      labels:
        app.kubernetes.io/name: searxng
        app.kubernetes.io/part-of: homelab
    spec:
      enableServiceLinks: false
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
        - name: searxng
          image: searxng/searxng:latest@sha256:c9100c29c14a77d5289263a671580226c3b8a396a1a0130d2f500f57076a0119
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Dublin
            - name: SEARXNG_BASE_URL
              value: https://search.sunnyside.home
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          volumeMounts:
            - name: data
              mountPath: /etc/searxng
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: searxng-data
