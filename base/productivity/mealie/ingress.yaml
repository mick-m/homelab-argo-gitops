apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mealie
  namespace: productivity
  labels:
    app.kubernetes.io/name: mealie
    app.kubernetes.io/part-of: homelab
  annotations:
    cert-manager.io/cluster-issuer: stepca-acme
spec:
  ingressClassName: traefik
  rules:
    - host: mealie.sunnyside.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mealie
                port:
                  number: 80
  tls:
    - hosts:
        - mealie.sunnyside.home
      secretName: -tls
