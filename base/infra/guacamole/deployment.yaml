apiVersion: apps/v1
kind: Deployment
metadata:
  name: guacamole
  namespace: infra
  labels:
    app.kubernetes.io/name: guacamole
    app.kubernetes.io/part-of: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: guacamole
  template:
    metadata:
      labels:
        app.kubernetes.io/name: guacamole
        app.kubernetes.io/part-of: homelab
    spec:
      enableServiceLinks: false
      initContainers:
        - name: wait-for-db
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z guacamole-db 5432; do sleep 2; done
              echo "PostgreSQL is ready"
        - name: init-schema
          image: guacamole/guacamole:latest
          command:
            - sh
            - -c
            - /opt/guacamole/bin/initdb.sh --postgresql > /schema/initdb.sql
          volumeMounts:
            - name: schema
              mountPath: /schema
        - name: apply-schema
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              PGPASSWORD=guacamole-k3s-2026 psql -h guacamole-db -U guacamole -d guacamole -c "SELECT 1 FROM guacamole_user LIMIT 1" 2>/dev/null && echo "Schema exists" && exit 0
              echo "Applying schema..."
              PGPASSWORD=guacamole-k3s-2026 psql -h guacamole-db -U guacamole -d guacamole < /schema/initdb.sql
          volumeMounts:
            - name: schema
              mountPath: /schema
      containers:
        - name: guacd
          image: guacamole/guacd:latest
          ports:
            - containerPort: 4822
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
        - name: guacamole
          image: guacamole/guacamole:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: GUACD_HOSTNAME
              value: localhost
            - name: GUACD_PORT
              value: "4822"
            - name: POSTGRESQL_HOSTNAME
              value: guacamole-db
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: POSTGRESQL_DATABASE
              value: guacamole
            - name: POSTGRESQL_USER
              value: guacamole
            - name: POSTGRESQL_PASSWORD
              value: guacamole-k3s-2026
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: schema
          emptyDir: {}
