apiVersion: apps/v1
kind: Deployment
metadata:
  name: thirteenft
  namespace: utilities
  labels:
    app.kubernetes.io/name: thirteenft
    app.kubernetes.io/part-of: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: thirteenft
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thirteenft
        app.kubernetes.io/part-of: homelab
    spec:
      containers:
        - name: thirteenft
          image: wasimaster/13ft:latest
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Dublin
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
