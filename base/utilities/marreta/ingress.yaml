apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: marreta
  namespace: utilities
  labels:
    app.kubernetes.io/name: marreta
    app.kubernetes.io/part-of: homelab
  annotations:
    cert-manager.io/cluster-issuer: stepca-acme
spec:
  ingressClassName: traefik
  rules:
    - host: marreta.sunnyside.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: marreta
                port:
                  number: 80
  tls:
    - hosts:
        - marreta.sunnyside.home
      secretName: marreta-tls
