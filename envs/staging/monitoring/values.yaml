# kube-prometheus-stack Helm values — STAGING
# Significantly reduced resources to avoid OOM on the staging node.
# Chart: prometheus-community/kube-prometheus-stack

alertmanager:
  enabled: false

grafana:
  adminPassword: elGFw6zVWOmvhoZqSjMOoZBrMxctE9
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: local-path
  initChownData:
    enabled: false
  securityContext:
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  extraInitContainers:
    - name: fix-datasource-uids
      image: busybox:latest
      command:
        - sh
        - -c
        - |
          cd /var/lib/grafana/dashboards/exporters
          for f in *.json; do
            sed -i 's/\${DS_PROMETHEUS}/prometheus/g' "$f"
          done
      volumeMounts:
        - name: storage
          mountPath: /var/lib/grafana
  # Community Grafana dashboards for exporters
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: grafana-dashboards-exporters
          orgId: 1
          folder: Exporters
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/exporters
  dashboards:
    exporters:
      unifi-client-insights:
        gnetId: 11315
        revision: 9
        datasource: Prometheus
      unifi-network-sites:
        gnetId: 11311
        revision: 5
        datasource: Prometheus
      unifi-usg-insights:
        gnetId: 11313
        revision: 9
        datasource: Prometheus
      proxmox-ve:
        gnetId: 10347
        revision: 5
        datasource: Prometheus
      exportarr:
        gnetId: 12896
        revision: 1
        datasource: Prometheus
      qbittorrent:
        gnetId: 15116
        revision: 1
        datasource: Prometheus
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Prometheus
      nextcloud:
        gnetId: 9632
        revision: 1
        datasource: Prometheus

kubeStateMetrics:
  enabled: true

kube-state-metrics:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi

nodeExporter:
  enabled: true

prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 50m
      memory: 64Mi

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

prometheus:
  prometheusSpec:
    # Allow Prometheus to discover all ServiceMonitors in the cluster,
    # not just those matching the Helm release label.
    serviceMonitorSelectorNilUsesHelmValues: false
    retention: 6h
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi

# Disable non-essential components for staging
kubeApiServer:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
