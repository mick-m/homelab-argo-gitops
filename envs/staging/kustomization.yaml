apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging uses :latest tags (same as base) for daily auto-updates.
# Override here if staging needs different resources, replicas, etc.

resources:
  - ../../base/utilities
  - ../../base/media
  - ../../base/productivity
  - ../../base/infra
  - ../../base/monitoring

# Example: reduce resource limits for staging
# patches:
#   - path: patches/reduce-resources.yaml
