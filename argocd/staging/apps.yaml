# ArgoCD ApplicationSet for staging environment
# Generates one Application per namespace with AUTO-SYNC enabled
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: staging-apps
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - namespace: utilities
            path: envs/staging/utilities
          - namespace: media
            path: envs/staging/media
          - namespace: productivity
            path: envs/staging/productivity
          - namespace: infra
            path: envs/staging/infra
  template:
    metadata:
      name: "staging-{{namespace}}"
      namespace: argocd
      labels:
        env: staging
    spec:
      project: default
      source:
        repoURL: https://github.com/mick-m/homelab-argo-gitops.git
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{namespace}}"
      syncPolicy:
        # Staging: AUTO-SYNC enabled
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PruneLast=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
